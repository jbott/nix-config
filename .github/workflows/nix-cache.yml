name: nix-cache

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
  S3_BUCKET_NAME: ${{ vars.S3_BUCKET_NAME }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_SHARED_CREDENTIALS_FILE: /tmp/aws-credentials

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: macos-latest
            system: aarch64-darwin
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup cache credentials and signing key
        if: vars.S3_BUCKET_NAME != ''
        run: |
          # Setup Nix cache signing key
          echo "${{ secrets.NIX_CACHE_PRIVATE_KEY }}" > /tmp/cache-priv-key.pem
          chmod 600 /tmp/cache-priv-key.pem

          # Setup AWS credentials in /tmp (accessible to all users on both platforms)
          cat > /tmp/aws-credentials << 'EOC'
          [default]
          aws_access_key_id = ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key = ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          EOC
          chmod 644 /tmp/aws-credentials

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            extra-substituters = s3://${{ env.S3_BUCKET_NAME }}?endpoint=${{ env.S3_ENDPOINT }}
            extra-trusted-public-keys = ${{ vars.NIX_CACHE_PUBLIC_KEY }}
            secret-key-files = /tmp/cache-priv-key.pem

      - name: Install nix-fast-build
        run: nix profile add nixpkgs#nix-fast-build

      - name: Build full flake
        run: |
          set -euo pipefail
          echo "Building full flake for ${{ matrix.system }}"
          
          nix-fast-build \
            --flake "." \
            --systems "${{ matrix.system }}" \
            --result-file result.json \
            --result-format json \
            --skip-cached \
            --no-nom

      - name: Push all dependencies to S3 cache
        if: always()
        run: |
          set -euo pipefail
          if [ ! -f result.json ]; then
            echo "No result.json found, skipping."
            exit 0
          fi

          echo "Identifying dependencies not in cache..."
          DRV_PATHS=$(jq -r '.[] | select(.error == null) | .drvPath' result.json)
          
          if [ -n "$DRV_PATHS" ]; then
            CACHE_URL="s3://${{ env.S3_BUCKET_NAME }}?endpoint=${{ env.S3_ENDPOINT }}"
            
            # 1. Get the full closure of all successful builds
            # 2. Filter out paths that already exist in the S3 cache using 'nix path-info --missing'
            # 3. Copy only the missing paths
            echo "$DRV_PATHS" | \
              xargs nix-store --query --requisites --include-outputs | \
              sort -u | \
              xargs nix path-info --missing --to "$CACHE_URL" | \
              xargs -r nix copy --to "$CACHE_URL"
            
            echo "Successfully synced missing paths to S3 cache"
          else
            echo "No successful builds found in result.json"
          fi
